name: Tyrs browser bridge artifact

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.event.release.tag_name, 'tyrs-v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.14.0
      - name: Download pinned Playwright Core artifact
        env:
          GH_TOKEN: ${{ github.token }}
          PLAYWRIGHT_RELEASE_TAG: tyrs-v0.1.0
        run: |
          install -d "${RUNNER_TEMP}/tyrs-playwright"
          gh release download "$PLAYWRIGHT_RELEASE_TAG" \
            --repo slovx2/playwright \
            --pattern playwright-core.tgz \
            --dir "${RUNNER_TEMP}/tyrs-playwright"
      - name: Build self-contained bridge bundle
        run: |
          npm install --no-save --package-lock=false --ignore-scripts --no-audit --no-fund \
            "${RUNNER_TEMP}/tyrs-playwright/playwright-core.tgz"
          npm run bridge:test
          node scripts/build-tyrs-bundle.mjs \
            "${RUNNER_TEMP}/tyrs-playwright/playwright-core.tgz" \
            out/tyrs-browser-bridge
      - name: Upload release artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            out/tyrs-browser-bridge/tyrs-browser-bridge-bundle.tgz \
            out/tyrs-browser-bridge/bridge-artifact.json \
            --clobber
